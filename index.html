<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GasyStock — Clé d'activation</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 16px; background: #f8fafc; color: #1e293b; }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; background: #1e293b; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #334155; }
    .result { margin-top: 20px; padding: 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; display: none; }
    .key { font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; color: #1e293b; word-break: break-all; }
    .copy-btn { margin-top: 12px; width: 100%; padding: 8px; background: #e2e8f0; color: #1e293b; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .error { color: #dc2626; font-size: 0.85rem; margin-top: -12px; margin-bottom: 12px; }
    #app { display: none; }
  </style>
</head>
<body>

  <!-- Ecran mot de passe -->
  <div id="login">
    <h1>🔐 Accès restreint</h1>
    <label for="pwd">Mot de passe</label>
    <input id="pwd" type="password" placeholder="••••••••" autocomplete="off" />
    <p class="error" id="pwd-error"></p>
    <button onclick="verifierMdp()">Accéder</button>
  </div>

  <!-- Generateur (affiché après auth) -->
  <div id="app">
    <h1>🔑 GasyStock — Clé d'activation</h1>
    <label for="machineId">Machine ID du client</label>
    <input id="machineId" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" />
    <button onclick="generer()">Générer la clé</button>
    <div class="result" id="result">
      <label>Clé d'activation :</label>
      <div class="key" id="key"></div>
      <button class="copy-btn" onclick="copier()">Copier</button>
    </div>
  </div>

<script>
// Hash du mot de passe (SHA-256 de "faniry123") — changer ici si besoin
const PWD_HASH = "896723194c375b4bdbb7d3aee1c0b8d63138ffe9d6ec1c31a5962dce393345c8";

function rotr(x, n) { return (x >>> n) | (x << (32-n)); }
function sha256(bytes) {
  const K = [
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ];
  let h = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const ml = bytes.length * 8;
  bytes.push(0x80);
  while (bytes.length % 64 !== 56) bytes.push(0);
  for (let i = 7; i >= 0; i--) bytes.push((ml / Math.pow(2, i*8)) & 0xff);
  for (let c = 0; c < bytes.length; c += 64) {
    const w = [];
    for (let i = 0; i < 16; i++) w[i] = (bytes[c+i*4]<<24)|(bytes[c+i*4+1]<<16)|(bytes[c+i*4+2]<<8)|bytes[c+i*4+3];
    for (let i = 16; i < 64; i++) {
      const s0 = rotr(w[i-15],7)^rotr(w[i-15],18)^(w[i-15]>>>3);
      const s1 = rotr(w[i-2],17)^rotr(w[i-2],19)^(w[i-2]>>>10);
      w[i] = (w[i-16]+s0+w[i-7]+s1)>>>0;
    }
    let [a,b,c2,d,e,f,g,hh] = h;
    for (let i = 0; i < 64; i++) {
      const S1 = rotr(e,6)^rotr(e,11)^rotr(e,25);
      const ch = (e&f)^(~e&g);
      const t1 = (hh+S1+ch+K[i]+w[i])>>>0;
      const S0 = rotr(a,2)^rotr(a,13)^rotr(a,22);
      const maj = (a&b)^(a&c2)^(b&c2);
      const t2 = (S0+maj)>>>0;
      hh=g; g=f; f=e; e=(d+t1)>>>0; d=c2; c2=b; b=a; a=(t1+t2)>>>0;
    }
    h[0]=(h[0]+a)>>>0; h[1]=(h[1]+b)>>>0; h[2]=(h[2]+c2)>>>0; h[3]=(h[3]+d)>>>0;
    h[4]=(h[4]+e)>>>0; h[5]=(h[5]+f)>>>0; h[6]=(h[6]+g)>>>0; h[7]=(h[7]+hh)>>>0;
  }
  return h.flatMap(x => [x>>>24,(x>>>16)&0xff,(x>>>8)&0xff,x&0xff]);
}
function strToBytes(s) { return Array.from(new TextEncoder().encode(s)); }
function bytesToHex(b) { return b.map(x => x.toString(16).padStart(2,'0')).join(''); }

function hmacSha256(keyBytes, msgBytes) {
  if (keyBytes.length > 64) keyBytes = sha256([...keyBytes]);
  while (keyBytes.length < 64) keyBytes.push(0);
  const ipad = keyBytes.map(b => b ^ 0x36);
  const opad = keyBytes.map(b => b ^ 0x5c);
  return sha256([...opad, ...sha256([...ipad, ...msgBytes])]);
}

function verifierMdp() {
  const pwd = document.getElementById('pwd').value;
  const hash = bytesToHex(sha256(strToBytes(pwd)));
  if (hash === PWD_HASH) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('pwd-error').textContent = 'Mot de passe incorrect';
    document.getElementById('pwd').value = '';
  }
}

function generer() {
  const machineId = document.getElementById('machineId').value.trim();
  if (!machineId) { alert("Entrez le Machine ID"); return; }
  const SECRET = "GASYSTOCK_STMG_XK9_2024_SECRET";
  const digest = hmacSha256(strToBytes(SECRET), strToBytes(machineId));
  const hex = digest.slice(0,10).map(b => b.toString(16).padStart(2,'0').toUpperCase()).join('');
  const key = hex.match(/.{1,4}/g).join('-');
  document.getElementById('key').textContent = key;
  document.getElementById('result').style.display = 'block';
}

function copier() {
  const key = document.getElementById('key').textContent;
  navigator.clipboard?.writeText(key).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copié !';
    setTimeout(() => btn.textContent = 'Copier', 2000);
  }).catch(() => window.prompt("Copier la clé :", key));
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') verifierMdp(); });
document.getElementById('machineId')?.addEventListener('keydown', e => { if (e.key === 'Enter') generer(); });
</script>
</body>
</html>
